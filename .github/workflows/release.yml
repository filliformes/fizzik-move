name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version consistency
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          JSON_VERSION=$(jq -r '.version' src/module.json)
          if [ "$TAG_VERSION" != "$JSON_VERSION" ]; then
            echo "ERROR: Tag ($TAG_VERSION) != module.json ($JSON_VERSION)"
            exit 1
          fi

      - name: Build (Docker cross-compile ARM64)
        run: |
          docker build -t fizzik-builder scripts
          mkdir -p dist/fizzik
          cp src/module.json dist/fizzik/
          cp src/help.json dist/fizzik/
          docker run --rm -v "$PWD:/repo" -w /repo fizzik-builder bash -c "\
            aarch64-linux-gnu-gcc -O2 -ffast-math -shared -fPIC \
              -o dist/fizzik/dsp.so src/dsp/fizzik.c -lm && \
            tar -czf dist/fizzik-module.tar.gz -C dist fizzik"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/fizzik-module.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release.json
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          REPO="${{ github.repository }}"
          URL="https://github.com/$REPO/releases/download/v$VERSION/fizzik-module.tar.gz"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH=$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')
          git fetch origin "$BRANCH"
          git checkout -f "$BRANCH"
          echo "{\"version\": \"$VERSION\", \"download_url\": \"$URL\"}" > release.json
          git add release.json
          git commit -m "chore: update release.json for v$VERSION [skip ci]"
          git push origin "$BRANCH"
